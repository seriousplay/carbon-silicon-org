# Carbon-Silicon Organization - Nginx Configuration
# Domain: csi-org.com
# Deploy to: /etc/nginx/conf.d/csi-org.conf

upstream csi_book_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream csi_loop_designer_backend {
    server 127.0.0.1:3010;
    keepalive 16;
}

upstream csi_loopos_backend {
    server 127.0.0.1:3040;
    keepalive 32;
}

upstream csi_workshops_backend {
    server 127.0.0.1:3030;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name csi-org.com www.csi-org.com carbon.daodecision.com;
    return 301 https://csi-org.com$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name csi-org.com www.csi-org.com;

    # SSL (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/csi-org.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/csi-org.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Static assets - long cache
    location ~* ^/(book|loop-designer|loopos|workshops)/_next/static/ {
        alias /var/www/carbon-silicon-org/apps/$1/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Root - redirect to /book
    location = / {
        return 302 /book;
    }

    # Book: 书籍介绍 + 诊断工具
    location /book {
        proxy_pass http://csi_book_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # Loop Designer: 回路设计器
    location /loop-designer {
        proxy_pass http://csi_loop_designer_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 360s;
        proxy_read_timeout 360s;
        proxy_buffering off;
    }

    # LoopOS: 回路操作系统
    location /loopos {
        proxy_pass http://csi_loopos_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # Workshops: 工作坊合集
    location /workshops {
        proxy_pass http://csi_workshops_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    # Legacy redirects (from carbon.daodecision.com)
    location /field-cocreation {
        return 301 https://csi-org.com/workshops/cocreate;
    }

    location /journal {
        return 301 https://csi-org.com/workshops/journal;
    }

    location /matrix-origin {
        return 301 https://csi-org.com/loopos;
    }
}
