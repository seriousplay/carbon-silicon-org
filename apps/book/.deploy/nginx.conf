# Nginx Configuration for Carbon Silicon Tools Site
#
# Performance optimizations applied:
# - Gzip/Brotli compression (70% size reduction for JS/CSS)
# - Static asset caching (1 year for immutable assets)
# - Keepalive connections (reuse connections)
# - Security headers
#
# Deployment:
# 1. Copy to /etc/nginx/conf.d/carbon-silicon-tools-site.conf
# 2. Test: nginx -t
# 3. Reload: nginx -s reload
#
# Server: Aliyun ECS (47.95.199.142)
# Upstream: PM2 cluster on port 3000

upstream carbon_silicon_backend {
    # PM2 cluster mode uses all available ports
    # Default: starts at 3000, increments for each instance
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    # Add more if using multiple PM2 instances:
    # server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:3002 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:3003 max_fails=3 fail_timeout=30s;

    keepalive 32; # Keepalive connections to upstream
}

upstream loop_designer_backend {
    server 127.0.0.1:3010 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name carbon.daodecision.com;

    # Access and error logs

    error_log /var/log/nginx/carbon-silicon-tools-site.error.log warn;

    # ========================================
    # GZIP COMPRESSION
    # ========================================
    gzip on;
    gzip_vary on; # Add Vary: Accept-Encoding header
    gzip_proxied any; # Compress all proxied responses
    gzip_comp_level 6; # Compression level (1-9, 6 is good balance)
    gzip_min_length 1024; # Only compress responses > 1KB
    gzip_buffers 16 8k; # Compression buffer size

    # Text files
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Disable gzip for already compressed formats
    gzip_disable "msie6";

    # ========================================
    # BROTLI (if nginx compiled with brotli)
    # Uncomment if available (usually via nginx-module-brotli)
    # ========================================
    # brotli on;
    # brotli_comp_level 6;
    # brotli_min_length 1024;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/rss+xml text/javascript image/svg+xml;

    # ========================================
    # SECURITY HEADERS
    # ========================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ========================================
    # CLIENT CONNECTION SETTINGS
    # ========================================
    client_max_body_size 10M; # Max upload size
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;

    # Keepalive connections from clients
    keepalive_timeout 65; # 65 seconds (recommended for HTTP/2)
    keepalive_requests 100; # Max requests per keepalive connection

    # ========================================
    # STATIC ASSETS CACHING
    # ========================================

    location ^~ /loop-designer {
        proxy_pass http://loop_designer_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 360s;
        proxy_read_timeout 360s;
        proxy_buffering off;
    }

    # Next.js static files (generated by next build) - MUST come before generic regex
    location /_next/static/ {
        # Cache static Next.js assets aggressively
        expires 1y;
        add_header Cache-Control "public, immutable";
        alias /var/www/carbon-silicon-org-book/apps/carbon-silicon-tools-site/.next/static/;
        access_log off;
    }

    # Public assets - MUST come before generic regex
    location /public/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        alias /var/www/carbon-silicon-org-book/apps/carbon-silicon-tools-site/public/;
        access_log off;
    }

    # Static assets from /public and other paths (images, fonts, etc.)
    # Note: Excluding .js and .css because they're handled by /_next/static/ and /public/ above
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot|otf|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        proxy_pass http://carbon_silicon_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ========================================
    # PROXY TO NEXT.JS
    # ========================================
    location / {
        proxy_pass http://carbon_silicon_backend;
        proxy_http_version 1.1;

        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Proxy timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Proxy buffering for better performance
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;
        proxy_headers_hash_max_size 1024;
        proxy_headers_hash_bucket_size 128;

        proxy_cache_bypass $http_upgrade;
    }

    # ========================================
    # HEALTH CHECK ENDPOINT
    # ========================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# HTTPS Server (SSL/TLS)
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name carbon.daodecision.com;

    # SSL Certificate (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/carbon.daodecision.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carbon.daodecision.com/privkey.pem;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # SSL Settings
    include /etc/letsencrypt/options-ssl-nginx.conf;

